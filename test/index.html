<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>shaggedy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0f;
      --surface:   #141418;
      --border:    rgba(255,255,255,0.07);
      --purple:    #9147ff;
      --text:      #f0eef8;
      --muted:      rgba(240,238,248,0.45);
      --live-red:  #ff4545;
      --grass:     #4ade80;
      --grass-dark:#22c55e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    .glow {
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(145,71,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Debug panel ── */
    .debug-panel {
      display: none;
      position: fixed;
      top: 12px; right: 12px;
      z-index: 200;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .debug-panel.visible { display: flex; }
    .debug-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    .debug-btns { display: flex; gap: 6px; }
    .debug-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .debug-btn:hover { border-color: var(--purple); color: var(--text); }
    .debug-btn.active { border-color: var(--live-red); color: var(--live-red); background: rgba(255,69,69,0.1); }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 48px;
      padding-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }

    .avatar-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--purple), #00f5d4);
      margin-bottom: 14px;
      box-shadow: 0 0 28px rgba(145,71,255,0.35);
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    .avatar-ring.live {
      background: linear-gradient(135deg, var(--live-red), #ff1a1a);
      box-shadow: 0 0 40px rgba(255,69,69,0.8), 0 0 80px rgba(255,69,69,0.4);
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 40px rgba(255,69,69,0.8), 0 0 80px rgba(255,69,69,0.4); }
      50%      { box-shadow: 0 0 60px rgba(255,69,69,1),   0 0 100px rgba(255,69,69,0.6); }
    }
    .avatar-ring img {
      width:100%; height:100%;
      border-radius:50%; object-fit:cover;
      display:block; transition:opacity 0.3s;
    }
    .avatar-ring img.loading { opacity:0; }
    .avatar-ring img.loaded  { opacity:1; }
    .avatar-fallback {
      width:100%; height:100%;
      border-radius:50%;
      background: linear-gradient(135deg,#1a1a2e,#2d1b69);
      display:flex; align-items:center; justify-content:center;
      font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--purple);
      position:absolute; top:0; left:0;
      transition: color 0.5s, opacity 0.3s;
    }
    .avatar-fallback.hidden { opacity:0; pointer-events:none; }

    .profile h1 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:0.06em; margin-bottom:6px; }
    .profile p  { font-size:0.88rem; color:var(--muted); text-align:center; max-width:320px; line-height:1.5; }

    .live-badge {
      display:none; align-items:center; gap:6px;
      margin-top:8px; padding:4px 12px;
      background:rgba(255,69,69,0.15); border:1px solid rgba(255,69,69,0.3);
      border-radius:20px; font-size:0.75rem; font-weight:500;
      color:var(--live-red); text-transform:uppercase; letter-spacing:0.1em;
    }
    .live-badge.visible { display:flex; animation:fadeUp 0.4s ease; }
    .live-badge .dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--live-red); box-shadow:0 0 8px var(--live-red);
      animation:pulse 1.4s ease-in-out infinite;
    }

    /* ── Embed ── */
    .embed-section { margin-bottom:28px; animation:fadeUp 0.6s 0.1s ease both; }
    .embed-label {
      display:flex; align-items:center; gap:8px;
      font-size:0.72rem; font-weight:500; letter-spacing:0.14em;
      text-transform:uppercase; color:var(--muted); margin-bottom:10px;
    }
    .embed-label .dot {
      width:7px; height:7px; border-radius:50%;
      background:#ff4545; box-shadow:0 0 8px #ff4545;
      animation:pulse 1.4s ease-in-out infinite;
    }
    .embed-box {
      border-radius:12px; overflow:hidden;
      border:1px solid var(--border); background:#000;
      box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(145,71,255,0.1);
      position:relative; padding-top:56.25%;
    }
    .embed-box iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

    /* ── Links ── */
    .links-section { display:flex; flex-direction:column; gap:12px; }
    .link-card {
      display:flex; align-items:center; gap:16px;
      padding:16px 20px; background:var(--surface);
      border:1px solid var(--border); border-radius:14px;
      text-decoration:none; color:var(--text);
      transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s;
      animation:fadeUp 0.5s ease both;
    }
    .link-card.twitch  { --c:#9147ff; }
    .link-card.youtube { --c:#ff0000; }
    .link-card.insta   { --c:#e1306c; }
    .link-card.discord { --c:#5865f2; }
    .link-card.tiktok  { --c:#00f2ea; }
    .link-card.twitter { --c:#1d9bf0; }
    .link-card:hover {
      transform:translateY(-2px);
      border-color:var(--c);
      box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px var(--c),0 0 20px color-mix(in srgb,var(--c) 20%,transparent);
    }
    .icon-wrap {
      width:44px; height:44px; border-radius:10px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      background:color-mix(in srgb,var(--c) 15%,transparent);
      transition:background 0.2s;
    }
    .link-card:hover .icon-wrap { background:color-mix(in srgb,var(--c) 25%,transparent); }
    .icon-wrap svg { width:22px; height:22px; fill:var(--c); }
    .link-text { flex:1; }
    .link-name   { font-weight:500; font-size:0.97rem; display:block; margin-bottom:2px; }
    .link-handle { font-size:0.78rem; color:var(--muted); }
    .link-arrow  { color:var(--muted); font-size:1.1rem; transition:transform 0.18s,color 0.18s; }
    .link-card:hover .link-arrow { transform:translateX(3px); color:var(--c); }
    .link-card:nth-child(1){animation-delay:0.15s}
    .link-card:nth-child(2){animation-delay:0.2s}
    .link-card:nth-child(3){animation-delay:0.25s}
    .link-card:nth-child(4){animation-delay:0.3s}
    .link-card:nth-child(5){animation-delay:0.35s}
    .link-card:nth-child(6){animation-delay:0.4s}

    footer { text-align:center; margin-top:48px; margin-bottom:20px; font-size:0.72rem; color:rgba(255,255,255,0.15); letter-spacing:0.08em; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    /* ── Status indicator ── */
    .status-indicator {
      position:fixed; bottom:20px; left:10px;
      background:var(--surface); border:1px solid var(--border);
      color:var(--muted); padding:6px 10px; border-radius:6px;
      font-size:0.65rem; display:flex; align-items:center; gap:6px; z-index:100;
    }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
    .status-dot.checking { background:#ffd700; animation:pulse 1s infinite; }
    .status-dot.live     { background:var(--live-red); box-shadow:0 0 8px var(--live-red); }
    .status-dot.offline  { background:var(--purple); }
    .status-dot.manual   { background:#00f5d4; }

    /* ── Lawn ── */
    .lawn-hint {
      position:fixed; bottom:0; left:0; right:0; height:20px;
      background:linear-gradient(to top,rgba(74,222,128,0.1),transparent);
      display:flex; align-items:center; justify-content:center;
      font-size:0.65rem; color:var(--grass);
      opacity:0; transition:opacity 0.3s; z-index:49; pointer-events:none;
    }
    .lawn-hint.visible { opacity:1; }

    .lawn-container {
      position:fixed; bottom:0; left:0; right:0; height:0;
      background:linear-gradient(to bottom,#0a150a 0%,#060d06 100%);
      border-top:1px solid rgba(74,222,128,0.12);
      overflow:hidden; z-index:50;
      transition:height 0.3s ease;
      pointer-events:none;
    }
    .lawn-container.active { height:160px; pointer-events:auto; }

    .lawn-instruction {
      position:absolute; top:7px; left:50%; transform:translateX(-50%);
      font-size:0.68rem; color:rgba(74,222,128,0.4);
      pointer-events:none; z-index:10; white-space:nowrap;
    }
    .lawn-score {
      position:absolute; top:7px; right:14px;
      font-size:0.75rem; color:var(--grass); font-weight:500;
    }

    .grass-container {
      position:absolute; bottom:0; left:0; right:0; height:120px;
      display:flex; align-items:flex-end; justify-content:space-around; padding:0 4px;
    }
    .grass-blade {
      width:3px;
      background:linear-gradient(to top,#14532d,#4ade80);
      border-radius:2px 2px 0 0;
      transform-origin:bottom center;
      animation:grassSway 2.2s ease-in-out infinite;
      animation-delay:calc(var(--i)*0.07s);
      transition:height 0.15s ease, background 0.3s;
    }
    .grass-blade.cut {
      height:5px !important;
      background:linear-gradient(to top,#052e16,#14532d) !important;
      animation:none;
    }
    @keyframes grassSway {
      0%,100% { transform:rotate(-3deg); }
      50%      { transform:rotate(3deg); }
    }

    .lawnmower {
      position:absolute; bottom:22px; width:110px; height:90px;
      display:none; z-index:100; pointer-events:none;
      transform:translateX(-50%) scaleX(1);
      transition:transform 0.12s ease;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,0.7));
    }
    .lawnmower.active { display:block; }

    @keyframes wheelSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes bladeSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .cut-particle {
      position:absolute; width:5px; height:7px;
      background:var(--grass); border-radius:1px 50% 50% 1px;
      pointer-events:none;
      animation:particleFly 0.55s ease-out forwards;
    }
    @keyframes particleFly {
      0%  {transform:translate(0,0) rotate(0deg) scale(1);opacity:1}
      100%{transform:translate(var(--tx),-28px) rotate(var(--tr)) scale(0);opacity:0}
    }
  </style>
</head>

  function debugForce(live) {
    manualMode = true;
    if (autoCheckInterval) clearInterval(autoCheckInterval);

    document.getElementById('btnForceOffline').classList.toggle('active', !live);

    const img = document.getElementById('avatarImg');
    const fb = document.getElementById('avatarFallback');
    img.src = CONFIG.AVATAR_URL;
    img.onload = () => { img.classList.add('loaded'); fb.classList.add('hidden'); };
  }

  async function checkStatus() {
    if (manualMode) return;
    try {
      const r = await fetch(`https://decapi.me/twitch/uptime/${CONFIG.TWITCH_CHANNEL}`);
      const d = await r.text();
      setLiveUI(!d.includes("offline"));
    } catch { setLiveUI(false); }
  }

  function setLiveUI(live) {
    const ring = document.getElementById('avatarRing');
    const badge = document.getElementById('liveBadge');
    const stText = document.getElementById('statusText');
    const player = document.getElementById('videoPlayer');
    const p = window.location.hostname || 'localhost';

    // ACCOUNT BYPASS: Use youtube-nocookie and listType to bypass owner blocks
    const twitchURL = `https://player.twitch.tv/?channel=${CONFIG.TWITCH_CHANNEL}&parent=${p}&autoplay=true`;
    const youtubeURL = `https://www.youtube-nocookie.com/embed?listType=playlist&list=${CONFIG.YOUTUBE_UPLOADS_PLAYLIST}`;

    if (live) {
      ring.classList.add('live');
      badge.classList.add('visible');
      stText.textContent = '🔴 Streaming live on Twitch!';
      if (!player.src.includes('twitch')) player.src = twitchURL;
    } else {
      ring.classList.remove('live');
      badge.classList.remove('visible');
      stText.textContent = 'Currently offline · Check the latest VOD';
      if (!player.src.includes('youtube')) player.src = youtubeURL;
    }
    updateStatus(live ? 'live' : 'offline', live ? 'Live' : 'Offline');
  }

  function updateStatus(cls, label) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + cls;
    document.getElementById('statusLabel').textContent = label;
  }

  // LAWN LOGIC
  const grassContainer = document.getElementById('grassContainer');
  const mower = document.getElementById('lawnmower');
  let mowedCount = 0;
  const total = 60;

  function initLawn() {
    for (let i = 0; i < total; i++) {
      const b = document.createElement('div');
      b.className = 'grass-blade';
      b.style.setProperty('--i', i);
      b.style.height = (40 + Math.random() * 40) + 'px';
      grassContainer.appendChild(b);
    }
  }

  window.addEventListener('mousemove', (e) => {
    const rect = document.getElementById('lawnContainer').getBoundingClientRect();
    if (e.clientY > rect.top) {
      mower.classList.add('active');
      mower.style.left = e.clientX + 'px';
      
      document.querySelectorAll('.grass-blade').forEach(b => {
        const bRect = b.getBoundingClientRect();
        if (Math.abs(e.clientX - bRect.left) < 40 && !b.classList.contains('cut')) {
          b.classList.add('cut');
          mowedCount++;
          document.getElementById('lawnScore').innerText = `Mowed: ${Math.round((mowedCount/total)*100)}%`;
          setTimeout(() => { 
            b.classList.remove('cut'); 
            mowedCount--;
          }, 8000);
        }
      });
    } else {
      mower.classList.remove('active');
    }
  });

  window.onscroll = () => {
    const atBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;
    document.getElementById('lawnContainer').classList.toggle('active', atBottom);
    document.getElementById('lawnHint').classList.toggle('visible', !atBottom);
  };

  initLawn();
  loadAvatar();
  debugAuto();
</script>
</body>
</html>
